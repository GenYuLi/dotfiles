# fcitx5 Unicode addon — the "search a symbol by name" picker.
# Trigger, then type the English Unicode name (e.g. "element of" → ∈,
# "ideographic comma" → 、, "fullwidth comma" → ，) and pick from the list.
# Works in every app (terminal nvim included) because fcitx5 inserts the
# resolved character as ordinary typed text.
#
# Default upstream trigger is Control+Alt+Shift+U; rebound here to the
# handier Control+Alt+U. Change via fcitx5-configtool → Addons → Unicode,
# or just edit this file and reload (`fcitx5-remote -r`).
[Hotkey]
TriggerKey=
TriggerKey/0=Control+Alt+U
